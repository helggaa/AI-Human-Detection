name: Continuous Integration

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

jobs:

  test:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

      matrix:
        python-version:
          - "3.11"

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements-ci.txt

      - name: Ruff
        run: |
          ruff check .

      - name: Black
        run: |
          black --check .

      - name: Pytest
        run: |
          pytest

      # Uncomment if coverage is added later
      #
      # - name: Coverage
      #   run: |
      #     pytest --cov=src --cov-report=term-missing